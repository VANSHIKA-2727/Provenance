version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: provenance-api
    ports:
      - "4000:4000"
    env_file:
      - ./api/.env.development
    volumes:
      - ./api/src:/app/src
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: provenance-web
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    depends_on:
      - api
    restart: unless-stopped