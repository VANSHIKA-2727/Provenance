# API Gateway - Only handles external user traffic

upstream backend {
    server backend:3000 max_fails=3 fail_timeout=30s;
    # Can add more backend instances for scaling
}

server {
    listen 80;
    server_name localhost;
    
    # Increase client body size for file uploads (10MB)
    client_max_body_size 10M;

    # Health check endpoint (public)
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Public auth routes (signup, login, token refresh)
    location /api/auth/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # CORS headers if needed
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
    }

    # Protected routes - JWT validation required
    location /api/ {
        # Rate limiting: 10 requests per second per IP
        limit_req zone=api_limit burst=20 nodelay;
        
        # JWT validation via internal auth endpoint
        auth_request /_auth;
        
        # Capture user info from auth response
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_email $upstream_http_x_user_email;
        
        # Pass to backend with user headers
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # CRITICAL: Pass user info from JWT validation
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Email $user_email;
        proxy_set_header X-Gateway-Verified true;
        
        # Timeouts for long operations
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Internal JWT validation endpoint
    location = /_auth {
        internal;
        proxy_pass http://backend/api/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        
        # Hide auth endpoint from external access
        proxy_hide_header Authorization;
    }

    # Webhook endpoints (called by OCR/RAG services)
    # These need to be accessible but secured differently
    location /api/webhooks/ {
        # IP whitelist for internal services only
        allow 172.16.0.0/12;  # Docker network
        allow 10.0.0.0/8;     # Internal network
        deny all;
        
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Deny access to internal services
    location /ocr/ {
        return 403;
    }
    
    location /rag/ {
        return 403;
    }

    # Default: 404
    location / {
        return 404;
    }
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;