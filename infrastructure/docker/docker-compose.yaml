version: '3.8'

services:
  # ============================================
  # API GATEWAY (Nginx)
  # ============================================
  gateway:
    image: nginx:alpine
    container_name: epr_gateway
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - epr_network
    restart: unless-stopped

  # ============================================
  # BACKEND (Node.js Orchestrator)
  # ============================================
  backend:
    build: 
      context: ../../server
      dockerfile: Dockerfile
    container_name: epr_backend
    environment:
      # Server
      - PORT=3000
      - NODE_ENV=production
      
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      
      # Internal Service URLs (Backend calls these directly)
      - OCR_SERVICE_URL=http://ocr-service:8000
      - RAG_SERVICE_URL=http://rag-service:8001
      
      # Backend webhook URL (for OCR/RAG to call back)
      - BACKEND_WEBHOOK_URL=http://backend:3000/api/webhooks
      
      # CORS
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - epr_network
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # OCR SERVICE POOL
  # ============================================
  ocr-service:
    build:
      context: ../../backend  # Your Python OCR service
      dockerfile: Dockerfile
    container_name: epr_ocr
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
      # Webhook to call when OCR done
      - WEBHOOK_BASE_URL=${BACKEND_WEBHOOK_URL:-http://backend:3000/api/webhooks}
    networks:
      - epr_network
    restart: unless-stopped
    # Scale with: docker-compose up --scale ocr-service=3
    deploy:
      replicas: 2

  # ============================================
  # RAG SERVICE POOL
  # ============================================
  rag-service:
    build:
      context: ../../rag-service  # Your Python RAG service
      dockerfile: Dockerfile
    container_name: epr_rag
    environment:
      - PORT=8001
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      # Webhook to call when classification done
      - WEBHOOK_BASE_URL=${BACKEND_WEBHOOK_URL:-http://backend:3000/api/webhooks}
    networks:
      - epr_network
    restart: unless-stopped
    deploy:
      replicas: 2

  # ============================================
  # VECTOR DATABASE (Qdrant)
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: epr_qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - epr_network
    restart: unless-stopped

  # ============================================
  # LLM SERVICE (Ollama)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: epr_ollama
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - epr_network
    restart: unless-stopped
    # Pull model on first run
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5
        ollama pull llama3.2:1b
        wait
      "

# ============================================
# VOLUMES
# ============================================
volumes:
  backend_uploads:
    driver: local
  qdrant_storage:
    driver: local
  ollama_models:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  epr_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16